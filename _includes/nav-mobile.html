<div class="px-2 pt-2 pb-3">
  {% for item in nav %}
  <a
    href="{{ item.url }}"
    class="mt-2 block rounded-md px-3 py-2 text-xl font-medium text-gray-900 transition duration-150 ease-in-out hover:bg-gray-200 focus:bg-gray-900 focus:text-white focus:outline-none"
  >
    {{ item.title }}
  </a>
  {% endfor %}
</div>
