<!-- navigation on larger view ports -->
<div class="hidden lg:block lg:ml-6 grow">
  <div class="ml-4 flex items-center h-16">
    {% for item in nav %}
    <div
      class="flex items-center h-16 border-l border-gray-200{% if forloop.last %} border-r border-gray-200{% endif %}"
    >
      <div
        class="w-full h-full flex items-center border-t-4 border-transparent border-solid hover:border-teal-400 hover:bg-gray-200 transition duration-150 ease-in-out"
      >
        <a
          href="{{ item.url }}"
          class="px-4 text-base font-bold leading-5 xl:text-lg text-gray-800 focus:text-black focus:outline-none {% if item.url == page.url %}active{% endif %}"
        >
          {{ item.title }}</a
        >
      </div>
    </div>
    {% endfor %}
  </div>
</div>
