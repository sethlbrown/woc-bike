<head>
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Preload critical assets -->
  <link rel="preload" href="/assets/css/stylev3.css" as="style" />
  <link rel="preload" href="/assets/js/navigation.js" as="script" />
  {% if banner_type == "home" %}
  <link rel="preload" href="/assets/img/home_banner_bike_project_kid.webp" as="image" type="image/webp" fetchpriority="high" />
  {% endif %}

  <!-- Favicon -->
  <link rel="shortcut icon" type="image/png" href="/assets/img/favicon.png" />

  <!-- Title -->
  <title>
    {% if title %}{{ title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}
  </title>

  <!-- SEO meta tags -->
  <meta name="description" content="{{ description | default: site.description }}" />
  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:title" content="{{ title | default: site.title }}" />
  <meta property="og:description" content="{{ description | default: site.description }}" />
  {% if og_image %}
  <meta property="og:image" content="{{ site.url }}{{ og_image }}" />
  {% endif %}
  <meta name="theme-color" content="#25A2AA" />

  <!-- CSS -->
  <link rel="stylesheet" href="/assets/css/stylev3.css" />

  <!-- RSS Feed -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="/feed.xml" />

  <!-- Scripts with performance attributes -->
  <script defer src="/assets/js/navigation.js"></script>

  <!-- Conditional scripts -->
  {% if title == 'Contact' %}
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  {% endif %}

  <!-- DNS prefetch and preconnect for external resources -->
  <link rel="dns-prefetch" href="https://www.google.com">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
</head>
